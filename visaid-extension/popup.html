<!DOCTYPE html>
<html>
<head>
  <title>VisAid</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
    }
    h3 { margin: 0 0 8px; color: #333; }
    .hint { font-size: 12px; color: #777; }
    .divider { border-top: 1px solid #ddd; margin: 12px 0; }
    .section { margin: 12px 0; }
    .section label { font-weight: 600; display: block; margin-bottom: 6px; }
    input[type="file"] { display: block; margin-bottom: 8px; width: 100%; }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #45a049; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 8px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <h3>VisAid AI</h3>
  <p class="hint">Press <b>ffff</b> on any page to start voice fill</p>

  <div class="divider"></div>

  <div class="section">
    <label>PDF Auto-Fill</label>
    <input type="file" id="pdfInput" accept=".pdf">
    <button id="uploadBtn">Fill Form from PDF</button>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
